spec_id: "pipeline_pmarp_rebound_v1"
benchmark: "SPY"
universe:
  market_cap_min_usd: 100000000000
  exclude_sectors: ["Utilities", "Energy", "Real Estate"]
  min_names: 20
factors:
  - name: "PMARP_Rebound_V1"
    params:
      trigger_threshold: 2.0
      pmarp_ema_period: 20
      pmarp_lookback: 150
      rvol_lookback: 120
      rvol_threshold: 2.0
      holding_window_days: 30
      regime_symbol: "SPY"
      regime_fast_ema: 120
      regime_slow_ema: 144
      regime_slope_lookback: 20
      score_mode: "signal_rvol"
    transform: "raw"
combo:
  method: "single"
portfolio:
  selection: "top_n"
  top_n: 10
  rebalance: "daily"
  weighting: "equal"
  max_position_weight: 0.1
  max_annual_turnover: 20.0
execution:
  timing: "next_open"
  transaction_cost_bps: 5.0
  spread_bps: 2.0
evaluation:
  newey_west_lag_days: 5
period:
  start: "2024-01-02"
  train_end: "2024-12-31"
  test_end: "2025-12-31"
notes: "PMARP upcross 2% trigger + RVOL>2 confirmation + SPY EMA120/144 regime filter, carried for 30 trading days."
